; =============================================================================
; PHP-FPM Pool Configuration — SMK Muhammadiyah Bligo
; Pool : smkmuhbligo
; Socket: /run/php/php8.3-fpm-smkmuhbligo.sock
; Path  : /etc/php/8.3/fpm/pool.d/smkmuhbligo.conf
; PHP   : 8.3
; Updated: 2026-03-06
; =============================================================================

[smkmuhbligo]

; ─── User & Group ─────────────────────────────────────────────────────────────
user  = www-data
group = www-data

; Socket dedicated per-site (lebih aman dari socket global)
listen = /run/php/php8.3-fpm-smkmuhbligo.sock

; Permissions socket agar Apache bisa baca/tulis
listen.owner = www-data
listen.group = www-data
listen.mode  = 0660

; ─── Process Manager ──────────────────────────────────────────────────────────
pm                   = dynamic
pm.max_children      = 20
pm.start_servers     = 5
pm.min_spare_servers = 3
pm.max_spare_servers = 10
pm.max_requests      = 500

; Halaman status FPM (akses dari localhost saja)
pm.status_path = /fpm-status

; Ping untuk health check
ping.path     = /fpm-ping
ping.response = pong

; ─── Logging ───────────────────────────────────────────────────────────────────
; Log request lambat (> 5 detik)
slowlog                  = /var/log/php8.3-fpm-smkmuhbligo-slow.log
request_slowlog_timeout  = 5s

; Log error pool ini
php_admin_value[error_log]  = /var/log/php8.3-fpm-smkmuhbligo-error.log
php_admin_flag[log_errors]  = on

; ─── PHP Settings Override ─────────────────────────────────────────────────────
; Upload — sesuaikan dengan LimitRequestBody Apache (20M)
php_admin_value[upload_max_filesize]   = 20M
php_admin_value[post_max_size]         = 25M
php_admin_value[max_execution_time]    = 120
php_admin_value[max_input_time]        = 60
php_admin_value[memory_limit]          = 256M
php_admin_value[date.timezone]         = Asia/Jakarta
php_admin_value[max_input_vars]        = 3000

; Production: matikan semua display error
php_flag[display_errors]         = off
php_flag[display_startup_errors] = off

; OPcache — wajib aktif di production
php_admin_flag[opcache.enable]                  = on
php_admin_value[opcache.memory_consumption]     = 128
php_admin_value[opcache.max_accelerated_files]  = 10000
php_admin_value[opcache.revalidate_freq]        = 60
; Di production: matikan validate_timestamps untuk performa maksimal.
; Setelah deploy, OPcache auto-clear via php artisan opcache:clear (atau restart php-fpm)
php_admin_flag[opcache.validate_timestamps]     = off
php_admin_flag[opcache.save_comments]            = on   ; dibutuhkan Doctrine/Attributes

; Session via Redis
php_value[session.save_handler] = redis
php_value[session.save_path]    = "tcp://127.0.0.1:6379"

; ─── Environment Variables ─────────────────────────────────────────────────────
env[HOSTNAME]      = $HOSTNAME
env[PATH]          = /usr/local/bin:/usr/bin:/bin
env[TMP]           = /tmp
env[TMPDIR]        = /tmp
env[TEMP]          = /tmp
