# =============================================================================
# Apache Virtual Host — SMK Muhammadiyah Bligo
# Domain      : smkmuhbligo.sch.id
# DocumentRoot: /var/www/smkmuhbligo/public
# PHP         : 8.3 via PHP-FPM (Unix Socket)
# Path server : /etc/apache2/sites-available/smkmuhbligo.sch.id.conf
# Updated     : 2026-03-06
#
# Aktifkan modules dulu sebelum reload:
#   sudo a2enmod rewrite ssl proxy_fcgi setenvif headers deflate expires
#   sudo a2enconf php8.3-fpm
#   sudo a2ensite smkmuhbligo.sch.id
#   sudo apachectl configtest && sudo systemctl reload apache2
# =============================================================================


# ─── VirtualHost: HTTP → redirect permanen ke HTTPS ──────────────────────────
<VirtualHost *:80>
    ServerName  smkmuhbligo.sch.id
    ServerAlias www.smkmuhbligo.sch.id

    # Let's Encrypt / Certbot ACME challenge (jangan di-redirect)
    Alias /.well-known/acme-challenge/ /var/www/certbot/.well-known/acme-challenge/
    <Directory /var/www/certbot/.well-known/acme-challenge/>
        Options None
        AllowOverride None
        Require all granted
    </Directory>

    # Redirect semua (kecuali ACME) ke HTTPS non-www
    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^ https://smkmuhbligo.sch.id%{REQUEST_URI} [R=301,L,NE]

    ErrorLog  ${APACHE_LOG_DIR}/smkmuhbligo-http-error.log
    CustomLog ${APACHE_LOG_DIR}/smkmuhbligo-http-access.log combined
</VirtualHost>


# ─── VirtualHost: www → non-www redirect (HTTPS) ─────────────────────────────
<VirtualHost *:443>
    ServerName www.smkmuhbligo.sch.id

    SSLEngine on
    # Sertifikat diisi oleh Certbot — jangan ubah manual
    SSLCertificateFile    /etc/letsencrypt/live/smkmuhbligo.sch.id/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/smkmuhbligo.sch.id/privkey.pem

    RedirectPermanent / https://smkmuhbligo.sch.id/

    ErrorLog  ${APACHE_LOG_DIR}/smkmuhbligo-www-error.log
</VirtualHost>


# ─── VirtualHost: HTTPS (main) ────────────────────────────────────────────────
<VirtualHost *:443>
    ServerName  smkmuhbligo.sch.id
    DocumentRoot /var/www/smkmuhbligo/public

    # ── SSL ──────────────────────────────────────────────────────────────────
    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/smkmuhbligo.sch.id/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/smkmuhbligo.sch.id/privkey.pem

    # Modern TLS — mengikuti Mozilla Intermediate profile
    SSLProtocol             all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256
    SSLHonorCipherOrder     off
    SSLSessionTickets       off

    # OCSP Stapling
    SSLUseStapling          on
    SSLStaplingCache        "shmcb:logs/ssl_stapling(32768)"

    # ── PHP-FPM via Unix Socket ───────────────────────────────────────────────
    <FilesMatch \.php$>
        SetHandler "proxy:unix:/run/php/php8.3-fpm-smkmuhbligo.sock|fcgi://localhost"
    </FilesMatch>

    # ── Laravel Public Directory ──────────────────────────────────────────────
    <Directory /var/www/smkmuhbligo/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # ── Upload Limit (gallery foto) ───────────────────────────────────────────
    # 20MB = 20 * 1024 * 1024 = 20971520 bytes
    LimitRequestBody 20971520

    # ── Gzip Compression (mod_deflate) ────────────────────────────────────────
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE \
            text/html \
            text/plain \
            text/xml \
            text/css \
            text/javascript \
            application/javascript \
            application/x-javascript \
            application/json \
            application/ld+json \
            application/manifest+json \
            application/xml \
            application/rss+xml \
            application/atom+xml \
            image/svg+xml \
            font/ttf \
            font/otf \
            font/woff \
            font/woff2

        # Jangan kompres file yang sudah terkompres
        SetEnvIfNoCase Request_URI \
            \.(?:gif|jpe?g|png|webp|avif|zip|gz|bz2|mp4|webm)$ no-gzip

        # Deflate level 6 (balance antara kecepatan & ukuran)
        DeflateCompressionLevel 6
    </IfModule>

    # ── Browser Caching via mod_expires ──────────────────────────────────────
    <IfModule mod_expires.c>
        ExpiresActive on

        # Hashed assets Vite (fingerprinted) — 1 tahun
        <FilesMatch "\.(js|css|woff2?|ttf|eot|otf)$">
            ExpiresDefault "access plus 1 year"
            Header append Cache-Control "public, immutable"
        </FilesMatch>

        # Gambar media upload — 1 hari
        <FilesMatch "\.(jpg|jpeg|png|gif|webp|avif|svg|ico)$">
            ExpiresDefault "access plus 1 day"
            Header append Cache-Control "public"
        </FilesMatch>

        # HTML/JSON — no cache (dihandle Laravel)
        <FilesMatch "\.(html|htm)$">
            ExpiresDefault "access plus 0 seconds"
            Header set Cache-Control "no-store, no-cache, must-revalidate"
        </FilesMatch>
    </IfModule>

    # ── Fallback Cache-Control (mod_headers) jika mod_expires tidak ada ───────
    <IfModule mod_headers.c>
        # Hashed Vite assets: public/build/assets/*.hash.js|css
        <FilesMatch "\.(js|css|woff2?|ttf|eot)$">
            Header set Cache-Control "max-age=31536000, public, immutable"
        </FilesMatch>

        # Media uploads (Spatie Media Library → storage/)
        <FilesMatch "\.(jpg|jpeg|png|gif|webp|avif|svg)$">
            Header set Cache-Control "max-age=86400, public"
        </FilesMatch>
    </IfModule>

    # ── Security Headers ──────────────────────────────────────────────────────
    <IfModule mod_headers.c>
        Header always set X-Frame-Options           "SAMEORIGIN"
        Header always set X-Content-Type-Options    "nosniff"
        Header always set X-XSS-Protection          "1; mode=block"
        Header always set Referrer-Policy           "strict-origin-when-cross-origin"
        Header always set Permissions-Policy        "camera=(), microphone=(), geolocation=()"

        # Content Security Policy
        # Sesuaikan jika ada CDN/analytics tambahan
        Header always set Content-Security-Policy \
            "default-src 'self'; \
             script-src 'self' 'unsafe-inline' https://fonts.googleapis.com; \
             style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; \
             font-src 'self' https://fonts.gstatic.com data:; \
             img-src 'self' data: blob: https:; \
             media-src 'self' https:; \
             connect-src 'self'; \
             frame-ancestors 'self'; \
             base-uri 'self'; \
             form-action 'self';"

        # HSTS — aktifkan setelah HTTPS stabil minimum 1 minggu
        # Header always set Strict-Transport-Security "max-age=15768000; includeSubDomains; preload"

        # Hapus header server (informasi versi)
        Header always unset X-Powered-By
        Header always unset Server
    </IfModule>

    # ── Rate Limiting /admin/ai/ ──────────────────────────────────────────────
    # Apache mod_ratelimit hanya untuk bandwidth, bukan req/menit per IP.
    # Rate limiting per-IP untuk AI endpoint ditangani di Laravel:
    #   RateLimiter::for('ai', fn($req) => Limit::perMinute(10)->by($req->ip()))
    # (sudah dikonfigurasi di app/Providers/RouteServiceProvider.php)
    #
    # Jika ingin firewall-level rate limiting, gunakan fail2ban:
    #   /etc/fail2ban/filter.d/apache-smkmuhbligo.conf
    #   /etc/fail2ban/jail.d/smkmuhbligo.conf

    # ── Block akses file sensitif ─────────────────────────────────────────────
    <FilesMatch "(\.env|\.htaccess|\.htpasswd|composer\.json|composer\.lock|package\.json|package-lock\.json)$">
        Require all denied
    </FilesMatch>

    # Block akses ke direktori hidden (.git, .agents, dll)
    <DirectoryMatch "^/var/www/smkmuhbligo/\.">
        Require all denied
    </DirectoryMatch>

    # ── Logging ───────────────────────────────────────────────────────────────
    ErrorLog  ${APACHE_LOG_DIR}/smkmuhbligo-error.log
    CustomLog ${APACHE_LOG_DIR}/smkmuhbligo-access.log combined

    # Log slow request > 5 detik (opsional)
    # LogFormat "%h %l %u %t \"%r\" %>s %b %D" timing
    # CustomLog ${APACHE_LOG_DIR}/smkmuhbligo-timing.log timing env=REDIRECT_STATUS
</VirtualHost>

# OCSP Stapling cache (global, letakkan di luar VirtualHost jika belum ada)
# SSLUseStapling on
# SSLStaplingCache "shmcb:/var/run/apache2/stapling_cache(128000)"
